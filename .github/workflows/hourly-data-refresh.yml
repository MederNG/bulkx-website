name: Hourly Data Refresh

on:
  schedule:
    # Runs at minute 0 of every hour (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest BULK Aura data
        run: npm run fetch
        env:
          BULK_API_BASE: https://indexer.bulk.trade

      - name: Commit updated snapshots
        shell: bash
        run: |
          if git diff --quiet -- data/leaderboard.json data/snapshots.json; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git pull --rebase origin main
          git add data/leaderboard.json data/snapshots.json
          git commit -m "chore: refresh hourly aura snapshots"
          git push
