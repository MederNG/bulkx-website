name: Hourly Data Refresh

on:
  schedule:
    # Runs at minute 0 of every hour (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hourly-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest BULK Aura data
        run: npm run fetch
        env:
          BULK_API_BASE: https://indexer.bulk.trade

      - name: Commit updated snapshots
        shell: bash
        run: |
          if git diff --quiet -- data/leaderboard.json data/snapshots.json; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json data/snapshots.json
          git commit -m "chore: refresh hourly aura snapshots"

          # The fetch takes several minutes, so main may have moved on (manual
          # pushes or a prior run). Retry: re-base our freshly fetched data on top
          # of the latest remote (our data files always win) and push again.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt — syncing with latest main..."
            git fetch origin main
            git reset --soft origin/main
            git add data/leaderboard.json data/snapshots.json
            if git diff --cached --quiet; then
              echo "Remote already up to date with our data."
              exit 0
            fi
            git commit -m "chore: refresh hourly aura snapshots"
            sleep $((RANDOM % 8 + 3))
          done

          echo "::error::Failed to push hourly snapshot after 5 attempts."
          exit 1
