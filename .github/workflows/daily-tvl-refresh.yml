name: Daily TVL Refresh

on:
  schedule:
    # Runs once per day (UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [tvl-refresh]

permissions:
  contents: write

concurrency:
  group: bulk-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest TVL totals
        run: npm run fetch:totals
        env:
          BULK_API_BASE: https://indexer.bulk.trade

      - name: Commit updated totals
        shell: bash
        run: |
          if git diff --quiet -- data/totals.json data/snapshots.json data/leaderboard.json; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/totals.json data/snapshots.json data/leaderboard.json
          git commit -m "chore: refresh TVL totals and wallet financials"

          # main may have moved on (manual pushes or the weekly job). Retry:
          # re-base our fresh data on top of the latest remote and push again.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt — syncing with latest main..."
            git fetch origin main
            git reset --soft origin/main
            git add data/totals.json data/snapshots.json data/leaderboard.json
            if git diff --cached --quiet; then
              echo "Remote already up to date with our data."
              exit 0
            fi
            git commit -m "chore: refresh TVL totals and wallet financials"
            sleep $((RANDOM % 8 + 3))
          done

          echo "::error::Failed to push hourly totals after 5 attempts."
          exit 1
